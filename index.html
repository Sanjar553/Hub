<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstoniC AI pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .typing-dot { animation: typing 1.4s infinite; }
        @keyframes typing { 0%, 20% { opacity: 0; } 50%, 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- Sarlavha -->
    <header class="bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-10 shadow-sm">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">E</div>
                <h1 class="text-xl font-semibold text-slate-800">EstoniC Live Chat</h1>
            </div>
            <span class="text-xs font-medium px-2 py-1 bg-green-100 text-green-700 rounded-full">Online</span>
        </div>
    </header>

    <!-- Chat oynasi -->
    <main id="chat-container" class="flex-grow max-w-4xl w-full mx-auto p-4 space-y-6 overflow-y-auto">
        <div class="flex gap-4 items-start">
            <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 shrink-0">E</div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 max-w-[80%]">
                <p class="text-slate-700 leading-relaxed">Salom! Men EstoniC AI-man. Menga istalgan savolingizni bering, men sizga real vaqt rejimida javob beraman.</p>
            </div>
        </div>
    </main>

    <!-- Kiritish maydoni -->
    <footer class="p-4 bg-white border-t border-slate-200">
        <div class="max-w-4xl mx-auto">
            <form id="chat-form" class="relative flex items-end gap-2">
                <textarea 
                    id="user-input" 
                    rows="1" 
                    placeholder="Savolingizni yozing..." 
                    class="w-full p-4 pr-12 rounded-2xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all resize-none bg-slate-50"
                ></textarea>
                <button 
                    type="submit" 
                    id="send-btn"
                    class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl transition-all shadow-lg disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
            <p class="text-[10px] text-center text-slate-400 mt-2 italic">EstoniC modelidan foydalanilmoqda</p>
        </div>
    </footer>

    <script>
        const apiKey = ""; // Avtomatik ravishda muhitdan olinadi
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Textarea balandligini avtomatik sozlash
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        async function fetchGeminiResponse(prompt, targetElement) {
            let fullResponse = "";
            let retryCount = 0;
            const maxRetries = 5;

            const makeRequest = async () => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "Sen aqlli va do'stona yordamchisan. Javoblaringni aniq va o'zbek tilida ber." }] }
                    })
                });

                if (!response.ok) throw new Error('API xatolik berdi');
                return await response.json();
            };

            try {
                // Eksponentsial orqaga qaytish bilan retry mexanizmi
                const executeWithRetry = async (attempt) => {
                    try {
                        return await makeRequest();
                    } catch (err) {
                        if (attempt < maxRetries) {
                            const delay = Math.pow(2, attempt) * 1000;
                            await new Promise(res => setTimeout(res, delay));
                            return executeWithRetry(attempt + 1);
                        }
                        throw err;
                    }
                };

                const data = await executeWithRetry(0);
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Kechirasiz, javob topilmadi.";
                
                // Animatsiya ko'rinishida yozish (streaming simulyatsiyasi)
                const words = text.split(' ');
                targetElement.innerHTML = "";
                for (let word of words) {
                    targetElement.innerHTML += word + " ";
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    await new Promise(res => setTimeout(res, 40)); // Yozish tezligi
                }

            } catch (error) {
                targetElement.innerHTML = `<span class="text-red-500 italic font-medium">Xatolik yuz berdi. Iltimos, qaytadan urinib ko'ring.</span>`;
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // Foydalanuvchi xabarini qo'shish
            const userMsgDiv = document.createElement('div');
            userMsgDiv.className = "flex justify-end gap-4 items-start";
            userMsgDiv.innerHTML = `
                <div class="bg-blue-600 text-white p-4 rounded-2xl shadow-md max-w-[80%]">
                    <p class="leading-relaxed">${text}</p>
                </div>
            `;
            chatContainer.appendChild(userMsgDiv);

            // Tozalash va yuklash holati
            userInput.value = "";
            userInput.style.height = 'auto';
            sendBtn.disabled = true;

            // AI javob qutisi
            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = "flex gap-4 items-start";
            const responseId = 'res-' + Date.now();
            aiMsgDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 shrink-0">🤖</div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 max-w-[80%]">
                    <p id="${responseId}" class="text-slate-700 leading-relaxed">
                        <span class="inline-block w-2 h-2 bg-slate-400 rounded-full animate-bounce"></span>
                        <span class="inline-block w-2 h-2 bg-slate-400 rounded-full animate-bounce [animation-delay:0.2s]"></span>
                        <span class="inline-block w-2 h-2 bg-slate-400 rounded-full animate-bounce [animation-delay:0.4s]"></span>
                    </p>
                </div>
            `;
            chatContainer.appendChild(aiMsgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // API dan ma'lumot olish
            await fetchGeminiResponse(text, document.getElementById(responseId));
            
            sendBtn.disabled = false;
        });
    </script>
</body>
</html>
